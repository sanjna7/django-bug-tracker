<h1>{{ bug.title }}</h1>
<p><strong>Description:</strong> {{ bug.description }}</p>
<p><strong>Status:</strong> {{ bug.status }}</p>
<p><strong>Created:</strong> {{ bug.created_at }}</p>

<a href="{% url 'bug_update' bug.pk %}">Edit</a>
<a href="{% url 'bug_delete' bug.pk %}">Delete</a>
<a href="{% url 'bug_list' %}">Back to List</a>
